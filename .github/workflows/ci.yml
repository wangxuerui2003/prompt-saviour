name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: crates/ps-gui/package-lock.json

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            crates/ps-gui/src-tauri

      - name: npm install (GUI)
        working-directory: crates/ps-gui
        run: npm ci

      - name: Build frontend (required by Tauri generate_context!)
        working-directory: crates/ps-gui
        run: npm run build

      - name: cargo test
        run: cargo test --workspace -- --test-threads=1

      - name: E2E
        shell: bash
        env:
          SKIP_GUI_LAUNCH: ${{ runner.os != 'macOS' && '1' || '' }}
        run: bash scripts/e2e.sh

  # Fast compile check without GUI npm build on PRs from forks is already covered above.
  # Release builds run in release.yml on version tags.
